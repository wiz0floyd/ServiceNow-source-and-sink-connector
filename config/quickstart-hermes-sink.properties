# ServiceNow Hermes Sink Connector — sample configuration
# Replace placeholder values before deploying.
#
# Sensitive properties (mark these as sensitive at Confluent Cloud upload time):
#   hermes.ssl.keystore.b64
#   hermes.ssl.keystore.password
#   hermes.ssl.truststore.b64
#   hermes.ssl.truststore.password
#
# CLI flag:
#   --sensitive-properties hermes.ssl.keystore.b64,hermes.ssl.keystore.password,hermes.ssl.truststore.b64,hermes.ssl.truststore.password

name=hermes-sink
connector.class=com.servicenow.kafka.connect.hermes.HermesSinkConnector
tasks.max=1

# Source: Confluent Cloud topic(s) to read from
topics=my-source-topic

# Pass-through bytes — do not change for MVP
key.converter=org.apache.kafka.connect.converters.ByteArrayConverter
value.converter=org.apache.kafka.connect.converters.ByteArrayConverter

# ServiceNow instance — bare name only (no protocol, no .service-now.com)
hermes.instance.name=myinstance

# Full Hermes topic to write to. Must already exist (no auto-create).
# Format: snc.<instance>.<namespace>.<app_id>.<topic>   (namespace optional)
hermes.topic=snc.myinstance.sn_streamconnect.my-topic

# mTLS — base64-encoded PKCS12 from Instance PKI Certificate Generator
# Encode the downloaded keystore: base64 -i keystore.p12
hermes.ssl.keystore.b64=<paste base64 keystore here>
hermes.ssl.keystore.password=<keystore password>
hermes.ssl.truststore.b64=<paste base64 truststore here>
hermes.ssl.truststore.password=<truststore password>

# Producer tuning (optional — defaults shown)
hermes.producer.acks=all
hermes.producer.retries=2147483647
